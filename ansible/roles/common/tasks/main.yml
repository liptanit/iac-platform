---
- name: Ensure baseline packages are present
  ansible.builtin.package:
    name:
      - curl
      - ca-certificates
      - gnupg
      - open-vm-tools
    state: present

- name: Install Zabbix Agent 2 from SYSAP package mirror on Ubuntu
  ansible.builtin.apt:
    deb: "{{ linux_zabbix_agent2_deb_url | default('http://10.1.0.15/agent/linux/zabbix-agent2_7.4.12-1+ubuntu24.04_amd64.deb') }}"
    state: present
  when: ansible_facts.os_family == "Debian"

- name: Ensure baseline marker directory exists
  ansible.builtin.file:
    path: /var/lib/iac
    state: directory
    mode: "0755"

- name: Write Linux baseline marker
  ansible.builtin.copy:
    dest: /var/lib/iac/baseline.txt
    mode: "0644"
    content: |
      Managed by OpenTofu + Ansible
      Hostname: {{ ansible_facts.hostname | default(inventory_hostname) }}
      Applied: {{ ansible_facts.date_time.iso8601 | default('unknown') }}

- name: Set timezone
  community.general.timezone:
    name: "{{ linux_timezone | default('Asia/Bangkok') }}"

- name: Set local SSH login password when supplied
  ansible.builtin.user:
    name: "{{ linux_login_user | default(ansible_user | default('iacadmin')) }}"
    password: "{{ linux_login_password_hash }}"
    password_lock: false
    update_password: always
  no_log: true
  when: linux_login_password_hash is defined and linux_login_password_hash | length > 0

- name: Configure SSH password authentication when requested
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/01-iac-password-auth.conf
    mode: "0644"
    content: |
      PasswordAuthentication yes
      KbdInteractiveAuthentication no
      UsePAM yes
  notify: Restart ssh
  when: linux_ssh_password_auth_enabled | default(false) | bool

- name: Remove older SSH password authentication override
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d/90-iac-password-auth.conf
    state: absent
  notify: Restart ssh
  when: linux_ssh_password_auth_enabled | default(false) | bool

- name: Ensure VMware Tools service is running
  ansible.builtin.service:
    name: open-vm-tools
    enabled: true
    state: started

- name: Configure Zabbix Agent 2 server
  ansible.builtin.lineinfile:
    path: /etc/zabbix/zabbix_agent2.conf
    regexp: "^Server="
    line: "Server={{ linux_zabbix_server | default('10.1.0.15') }}"
  notify: Restart zabbix-agent2

- name: Configure Zabbix Agent 2 active server
  ansible.builtin.lineinfile:
    path: /etc/zabbix/zabbix_agent2.conf
    regexp: "^ServerActive="
    line: "ServerActive={{ linux_zabbix_server | default('10.1.0.15') }}"
  notify: Restart zabbix-agent2

- name: Configure Zabbix Agent 2 hostname
  ansible.builtin.lineinfile:
    path: /etc/zabbix/zabbix_agent2.conf
    regexp: "^Hostname="
    line: "Hostname={{ ansible_facts.hostname | default(inventory_hostname) }}"
  notify: Restart zabbix-agent2

- name: Configure Zabbix Agent 2 host metadata
  ansible.builtin.lineinfile:
    path: /etc/zabbix/zabbix_agent2.conf
    regexp: "^HostMetadata="
    line: "HostMetadata={{ linux_zabbix_host_metadata | default('Linux') }}"
  notify: Restart zabbix-agent2

- name: Ensure Zabbix Agent 2 is running
  ansible.builtin.service:
    name: zabbix-agent2
    enabled: true
    state: started
