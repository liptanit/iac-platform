---
- name: Determine whether this host should run IIS/API baseline
  ansible.builtin.set_fact:
    windows_iis_role_matches: "{{ (iac_role | default('')) == windows_iis_only_for_role }}"

- name: Skip IIS/API baseline for non API Server roles
  ansible.builtin.debug:
    msg:
      host: "{{ inventory_hostname }}"
      iac_role: "{{ iac_role | default('') }}"
      skipped: true
      reason: "Host role is not {{ windows_iis_only_for_role }}."
  when: not windows_iis_role_matches | bool

- name: Run IIS/API Server baseline for API Server role
  when:
    - windows_iis_enabled | bool
    - windows_iis_role_matches | bool
  block:
    - name: Ensure IIS marker directory exists
      ansible.windows.win_file:
        path: "{{ windows_iis_marker_dir }}"
        state: directory

    - name: Resolve IIS/API Windows features available on this OS
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Stop'
        $desired = ConvertFrom-Json @'
        {{ windows_iis_features | to_json }}
        '@
        $skipWithoutSource = ConvertFrom-Json @'
        {{ windows_iis_features_skip_without_source | default([]) | to_json }}
        '@
        $features = @(Get-WindowsFeature)
        $availableNames = @($features | Select-Object -ExpandProperty Name)
        $removedNames = @($features | Where-Object { $_.InstallState -eq 'Removed' } | Select-Object -ExpandProperty Name)
        $valid = @($desired | Where-Object { ($availableNames -contains $_) -and ($removedNames -notcontains $_) -and ($skipWithoutSource -notcontains $_) })
        $missing = @($desired | Where-Object { $availableNames -notcontains $_ })
        $removed = @($desired | Where-Object { $removedNames -contains $_ })
        $skippedWithoutSource = @($desired | Where-Object { $skipWithoutSource -contains $_ })
        [pscustomobject]@{
          valid = $valid
          missing = $missing
          removed = $removed
          skipped_without_source = $skippedWithoutSource
        } | ConvertTo-Json -Compress
      register: windows_iis_feature_resolution
      changed_when: false

    - name: Store IIS/API Windows feature resolution
      ansible.builtin.set_fact:
        windows_iis_resolved_features: "{{ (windows_iis_feature_resolution.stdout | from_json).valid | default([]) }}"
        windows_iis_missing_features: "{{ (windows_iis_feature_resolution.stdout | from_json).missing | default([]) }}"
        windows_iis_removed_features: "{{ (windows_iis_feature_resolution.stdout | from_json).removed | default([]) }}"
        windows_iis_skipped_without_source_features: "{{ (windows_iis_feature_resolution.stdout | from_json).skipped_without_source | default([]) }}"

    - name: Report IIS/API Windows features unavailable on this OS
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          missing_features: "{{ windows_iis_missing_features }}"
      when: windows_iis_missing_features | length > 0

    - name: Report IIS/API Windows features requiring external source
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          removed_features: "{{ windows_iis_removed_features }}"
          note: "These features are marked Removed on this OS and require an external Windows source/SxS path."
      when: windows_iis_removed_features | length > 0

    - name: Report IIS/API Windows features skipped without external source
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          skipped_without_source_features: "{{ windows_iis_skipped_without_source_features }}"
          note: "These legacy features are skipped by policy unless a Windows source/SxS path is provided."
      when: windows_iis_skipped_without_source_features | length > 0

    - name: Install IIS/API Windows feature set
      ansible.windows.win_feature:
        name: "{{ windows_iis_resolved_features }}"
        include_management_tools: true
        state: present
      register: windows_iis_feature_result
      when: windows_iis_resolved_features | length > 0

    - name: Enable IIS Management Service
      ansible.windows.win_service:
        name: WMSVC
        start_mode: auto
        state: started
      when: windows_iis_enable_management_service | bool

    - name: Register ASP.NET 4.x with IIS when aspnet_regiis is present
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Continue'
        $aspnetRegIIS = "$env:windir\Microsoft.NET\Framework64\v4.0.30319\aspnet_regiis.exe"
        if (Test-Path $aspnetRegIIS) {
          & $aspnetRegIIS -i
          Write-Output 'ASP.NET 4.x registered with IIS.'
        } else {
          Write-Output 'aspnet_regiis.exe not found or not required on this OS.'
        }
      register: windows_iis_aspnet_register
      changed_when: "'registered with IIS' in windows_iis_aspnet_register.stdout"
      when: windows_iis_register_aspnet | bool

    - name: Enable 32-bit applications on DefaultAppPool
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Stop'
        Import-Module WebAdministration
        if (Test-Path "IIS:\AppPools\DefaultAppPool") {
          Set-ItemProperty "IIS:\AppPools\DefaultAppPool" -Name enable32BitAppOnWin64 -Value $true
          Write-Output 'DefaultAppPool enable32BitAppOnWin64 = true'
        }
      register: windows_iis_default_app_pool
      changed_when: "'enable32BitAppOnWin64 = true' in windows_iis_default_app_pool.stdout"
      when: windows_iis_enable_32bit_default_app_pool | bool

    - name: Stop IIS before ASP.NET Core Hosting Bundle install
      ansible.windows.win_command: iisreset /stop
      changed_when: true
      when: windows_iis_install_dotnet_hosting_bundle | bool

    - name: Check ASP.NET Core Module V2
      ansible.windows.win_stat:
        path: "{{ windows_iis_dotnet_module_path }}"
      register: windows_iis_dotnet_module_stat
      when: windows_iis_install_dotnet_hosting_bundle | bool

    - name: Ensure ASP.NET Core Hosting Bundle installer directory exists
      ansible.windows.win_file:
        path: '{{ windows_iis_temp_dir }}\IISInstall'
        state: directory
      when:
        - windows_iis_install_dotnet_hosting_bundle | bool
        - not windows_iis_dotnet_module_stat.stat.exists | default(false)

    - name: Download ASP.NET Core Hosting Bundle
      ansible.windows.win_get_url:
        url: "{{ windows_iis_dotnet_hosting_bundle_url }}"
        dest: "{{ windows_iis_dotnet_hosting_bundle_installer }}"
      when:
        - windows_iis_install_dotnet_hosting_bundle | bool
        - not windows_iis_dotnet_module_stat.stat.exists | default(false)

    - name: Install ASP.NET Core Hosting Bundle
      ansible.windows.win_package:
        path: "{{ windows_iis_dotnet_hosting_bundle_installer }}"
        arguments: /install /quiet /norestart
        state: present
        expected_return_code:
          - 0
          - 3010
      register: windows_iis_dotnet_hosting_bundle
      when:
        - windows_iis_install_dotnet_hosting_bundle | bool
        - not windows_iis_dotnet_module_stat.stat.exists | default(false)

    - name: Ensure API application logs directory exists when app path exists
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Stop'
        $appPath = '{{ windows_iis_app_path }}'
        if (Test-Path $appPath) {
          $logPath = Join-Path $appPath 'logs'
          if (!(Test-Path $logPath)) {
            New-Item -ItemType Directory -Path $logPath -Force | Out-Null
            Write-Output "created:$logPath"
          } else {
            Write-Output "exists:$logPath"
          }
        } else {
          Write-Output "missing:$appPath"
        }
      register: windows_iis_app_logs
      changed_when: "'created:' in windows_iis_app_logs.stdout"
      when: windows_iis_configure_app_permissions | bool

    - name: Apply IIS_IUSRS permissions to API app path when present
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Stop'
        $appPath = '{{ windows_iis_app_path }}'
        if (Test-Path $appPath) {
          $logPath = Join-Path $appPath 'logs'
          icacls $appPath /grant 'IIS_IUSRS:(OI)(CI)RX' /T
          icacls $logPath /grant 'IIS_IUSRS:(OI)(CI)M' /T
          Write-Output 'permissions_applied'
        } else {
          Write-Output 'app_path_missing'
        }
      register: windows_iis_app_permissions
      changed_when: "'permissions_applied' in windows_iis_app_permissions.stdout"
      when: windows_iis_configure_app_permissions | bool

    - name: Check IIS URL Rewrite module
      ansible.windows.win_reg_stat:
        path: HKLM:\SOFTWARE\Microsoft\IIS Extensions\URL Rewrite
      register: windows_iis_url_rewrite_reg
      when: windows_iis_install_url_rewrite | bool

    - name: Ensure URL Rewrite installer directory exists
      ansible.windows.win_file:
        path: "{{ windows_iis_temp_dir }}"
        state: directory
      when:
        - windows_iis_install_url_rewrite | bool
        - not windows_iis_url_rewrite_reg.exists | default(false)

    - name: Download IIS URL Rewrite Module installer
      ansible.windows.win_get_url:
        url: "{{ windows_iis_url_rewrite_url }}"
        dest: "{{ windows_iis_url_rewrite_msi }}"
      when:
        - windows_iis_install_url_rewrite | bool
        - not windows_iis_url_rewrite_reg.exists | default(false)

    - name: Install IIS URL Rewrite Module
      ansible.windows.win_package:
        path: "{{ windows_iis_url_rewrite_msi }}"
        arguments: /quiet /norestart
        state: present
      when:
        - windows_iis_install_url_rewrite | bool
        - not windows_iis_url_rewrite_reg.exists | default(false)

    - name: Configure IIS HTTP firewall rule
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Stop'
        $name = 'IaC-IIS-HTTP-80'
        $rule = Get-NetFirewallRule -Name $name -ErrorAction SilentlyContinue
        if (!$rule) {
          New-NetFirewallRule -Name $name -DisplayName 'IaC IIS HTTP 80' -Description 'IIS HTTP access managed by IaC API Server baseline.' -Direction Inbound -Action Allow -Protocol TCP -LocalPort 80 | Out-Null
          Write-Output 'created'
        } else {
          Set-NetFirewallRule -Name $name -Enabled True -Direction Inbound -Action Allow | Out-Null
          Set-NetFirewallPortFilter -AssociatedNetFirewallRule $rule -Protocol TCP -LocalPort 80 | Out-Null
          Write-Output 'updated'
        }
      register: windows_iis_http_firewall
      changed_when: "'created' in windows_iis_http_firewall.stdout or 'updated' in windows_iis_http_firewall.stdout"
      when: windows_iis_firewall_enabled | bool

    - name: Configure IIS HTTPS firewall rule
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Stop'
        $name = 'IaC-IIS-HTTPS-443'
        $rule = Get-NetFirewallRule -Name $name -ErrorAction SilentlyContinue
        if (!$rule) {
          New-NetFirewallRule -Name $name -DisplayName 'IaC IIS HTTPS 443' -Description 'IIS HTTPS access managed by IaC API Server baseline.' -Direction Inbound -Action Allow -Protocol TCP -LocalPort 443 | Out-Null
          Write-Output 'created'
        } else {
          Set-NetFirewallRule -Name $name -Enabled True -Direction Inbound -Action Allow | Out-Null
          Set-NetFirewallPortFilter -AssociatedNetFirewallRule $rule -Protocol TCP -LocalPort 443 | Out-Null
          Write-Output 'updated'
        }
      register: windows_iis_https_firewall
      changed_when: "'created' in windows_iis_https_firewall.stdout or 'updated' in windows_iis_https_firewall.stdout"
      when: windows_iis_firewall_enabled | bool

    - name: Restart IIS
      ansible.windows.win_command: iisreset
      changed_when: true
      when: windows_iis_restart_after_install | bool

    - name: Collect IIS/API baseline status
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Continue'
        $w3svc = Get-Service W3SVC -ErrorAction SilentlyContinue
        $wmsvc = Get-Service WMSVC -ErrorAction SilentlyContinue
        $urlRewrite = Test-Path 'HKLM:\SOFTWARE\Microsoft\IIS Extensions\URL Rewrite'
        $aspNetCoreModule = Test-Path '{{ windows_iis_dotnet_module_path }}'
        $dotnet = Get-Command dotnet.exe -ErrorAction SilentlyContinue
        $dotnetRuntimes = if ($dotnet) { & $dotnet.Source --list-runtimes } else { @() }
        $appPath = '{{ windows_iis_app_path }}'
        $logPath = Join-Path $appPath 'logs'
        $installed = Get-WindowsFeature | Where-Object {
          $_.Name -like 'Web-*' -and $_.InstallState -eq 'Installed'
        } | Select-Object Name, DisplayName, InstallState
        [PSCustomObject]@{
          host = $env:COMPUTERNAME
          role = '{{ iac_role | default("") }}'
          w3svc_status = if ($w3svc) { $w3svc.Status.ToString() } else { 'Missing' }
          wmsvc_status = if ($wmsvc) { $wmsvc.Status.ToString() } else { 'Missing' }
          url_rewrite_present = $urlRewrite
          aspnetcore_module_v2_present = $aspNetCoreModule
          dotnet_present = [bool]$dotnet
          dotnet_runtimes = $dotnetRuntimes
          app_path = $appPath
          app_path_present = Test-Path $appPath
          app_logs_path_present = Test-Path $logPath
          enable_32bit_default_app_pool = {{ '$true' if windows_iis_enable_32bit_default_app_pool | bool else '$false' }}
          feature_count = @($installed).Count
          features = $installed
        } | ConvertTo-Json -Depth 6
      register: windows_iis_status
      changed_when: false

    - name: Write IIS/API baseline marker
      ansible.windows.win_copy:
        dest: "{{ windows_iis_marker }}"
        content: |
          Managed by IaC IIS/API Server baseline.
          Host: {{ inventory_hostname }}
          Role: {{ iac_role | default('') }}
          Status: {{ windows_iis_status.stdout | default('') }}
