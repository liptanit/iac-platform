---
- name: Build Windows post-clone validation report
  hosts: windows
  gather_facts: true
  vars:
    windows_report_dir: /opt/appserver/backups/iac/windows-postclone-reports
  tasks:
    - name: Ensure local report directory exists
      ansible.builtin.file:
        path: "{{ windows_report_dir }}"
        state: directory
        mode: "0750"
      delegate_to: localhost
      run_once: true

    - name: Collect Windows validation signals
      ansible.windows.win_shell: |
        $ErrorActionPreference = 'Continue'
        $rdpDeny = (Get-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -ErrorAction SilentlyContinue).fDenyTSConnections
        $rdpFirewall = Get-NetFirewallRule -DisplayName 'IaC RDP 3389' -ErrorAction SilentlyContinue |
          Select-Object -First 1 -ExpandProperty Enabled
        $icmpFirewall = Get-NetFirewallRule -DisplayName 'IaC Allow ICMPv4 Echo' -ErrorAction SilentlyContinue |
          Select-Object -First 1 -ExpandProperty Enabled
        $winrm = Get-Service WinRM -ErrorAction SilentlyContinue
        $zabbix = Get-Service 'Zabbix Agent 2' -ErrorAction SilentlyContinue
        $w3svc = Get-Service 'W3SVC' -ErrorAction SilentlyContinue
        $wmsvc = Get-Service 'WMSVC' -ErrorAction SilentlyContinue
        $iisMarker = Test-Path 'C:\ProgramData\IaC\iis-baseline.txt'
        $iisFirewallHttp = Get-NetFirewallRule -DisplayName 'IaC IIS HTTP 80' -ErrorAction SilentlyContinue |
          Select-Object -First 1 -ExpandProperty Enabled
        $iisFirewallHttps = Get-NetFirewallRule -DisplayName 'IaC IIS HTTPS 443' -ErrorAction SilentlyContinue |
          Select-Object -First 1 -ExpandProperty Enabled
        $urlRewrite = Test-Path 'HKLM:\SOFTWARE\Microsoft\IIS Extensions\URL Rewrite'
        $aspNetCoreModule = Test-Path "$env:ProgramFiles\IIS\Asp.Net Core Module\V2\aspnetcorev2.dll"
        $dotnet = Get-Command dotnet.exe -ErrorAction SilentlyContinue
        $dotnetRuntimes = if ($dotnet) { & $dotnet.Source --list-runtimes } else { @() }
        $apiAppPath = 'C:\www\AirportServices'
        $sqlService = Get-Service 'MSSQLSERVER' -ErrorAction SilentlyContinue
        $sqlMarker = Test-Path 'C:\ProgramData\IaC\sql-baseline.txt'
        $sqlFirewall = Get-NetFirewallRule -DisplayName 'IaC SQL Server 1433' -ErrorAction SilentlyContinue |
          Select-Object -First 1 -ExpandProperty Enabled
        $audit = auditpol.exe /get /category:* 2>$null
        $hotfixes = Get-HotFix | Sort-Object InstalledOn -Descending | Select-Object -First 5 HotFixID, InstalledOn, Description
        $marker = Test-Path 'C:\ProgramData\IaC\postclone.txt'
        $baselineMarker = Test-Path 'C:\ProgramData\IaC\baseline.txt'
        $since = (Get-CimInstance Win32_OperatingSystem).LastBootUpTime
        $shellCrashes = Get-WinEvent -FilterHashtable @{
          LogName = 'Application'
          StartTime = $since
        } -ErrorAction SilentlyContinue | Where-Object {
          $_.ProviderName -eq 'Application Error' -and
          ($_.Message -match 'ShellHost\.exe' -or
           $_.Message -match 'Explorer\.EXE' -or
           $_.Message -match 'ControlCenter\.dll')
        } | Select-Object -First 10 TimeCreated, Id, Message

        [PSCustomObject]@{
          computer_name = $env:COMPUTERNAME
          domain = (Get-CimInstance Win32_ComputerSystem).Domain
          os_caption = (Get-CimInstance Win32_OperatingSystem).Caption
          os_version = (Get-CimInstance Win32_OperatingSystem).Version
          last_boot = $since
          timezone = (Get-TimeZone).Id
          winrm_status = if ($winrm) { $winrm.Status.ToString() } else { 'Missing' }
          rdp_enabled = ($rdpDeny -eq 0)
          rdp_firewall_enabled = $rdpFirewall
          icmp_firewall_enabled = $icmpFirewall
          zabbix_agent_status = if ($zabbix) { $zabbix.Status.ToString() } else { 'Missing' }
          iis_w3svc_status = if ($w3svc) { $w3svc.Status.ToString() } else { 'Missing' }
          iis_management_status = if ($wmsvc) { $wmsvc.Status.ToString() } else { 'Missing' }
          iis_baseline_marker = $iisMarker
          iis_http_firewall_enabled = $iisFirewallHttp
          iis_https_firewall_enabled = $iisFirewallHttps
          iis_url_rewrite_present = $urlRewrite
          iis_aspnetcore_module_v2_present = $aspNetCoreModule
          dotnet_present = [bool]$dotnet
          dotnet_runtimes = $dotnetRuntimes
          api_app_path_present = Test-Path $apiAppPath
          api_app_logs_path_present = Test-Path (Join-Path $apiAppPath 'logs')
          sql_server_status = if ($sqlService) { $sqlService.Status.ToString() } else { 'Missing' }
          sql_baseline_marker = $sqlMarker
          sql_firewall_enabled = $sqlFirewall
          baseline_marker = $baselineMarker
          postclone_marker = $marker
          recent_hotfixes = $hotfixes
          shell_crash_count = @($shellCrashes).Count
          shell_crashes = $shellCrashes
          audit_policy_sample = ($audit | Select-Object -First 80)
        } | ConvertTo-Json -Depth 6
      register: windows_validation_report
      changed_when: false

    - name: Write per-host validation report locally
      ansible.builtin.copy:
        dest: "{{ windows_report_dir }}/{{ inventory_hostname }}.json"
        content: "{{ windows_validation_report.stdout }}\n"
        mode: "0640"
      delegate_to: localhost

    - name: Show report path
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          report: "{{ windows_report_dir }}/{{ inventory_hostname }}.json"
