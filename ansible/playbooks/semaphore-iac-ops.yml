---
- name: Run Phase 11 IaC operation from Semaphore
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    iac_repo_dir: /opt/appserver/apps/iac/repositories/iac-platform
    iac_env: prod
    iac_report: true
    iac_postclone: false
    iac_postclone_vars: examples/windows-postclone-policy.production.yml
    iac_approved_by: ""
    iac_approval_token: ""

  tasks:
    - name: Validate requested IaC operation
      ansible.builtin.assert:
        that:
          - iac_action in ["plan", "apply", "validate", "destroy"]
          - iac_platform in ["linux", "windows"]
        fail_msg: "Set iac_action to plan/apply/validate/destroy and iac_platform to linux/windows."

    - name: Build IaC operation command
      ansible.builtin.set_fact:
        iac_command:
          - "{{ iac_repo_dir }}/scripts/iac-ops.py"
          - "{{ iac_action }}"
          - "--env"
          - "{{ iac_env }}"
          - "--platform"
          - "{{ iac_platform }}"

    - name: Add report flag
      ansible.builtin.set_fact:
        iac_command: "{{ iac_command + ['--report'] }}"
      when: iac_report | bool

    - name: Add Windows post-clone policy flags
      ansible.builtin.set_fact:
        iac_command: "{{ iac_command + ['--postclone', '--postclone-vars', iac_postclone_vars] }}"
      when: iac_platform == "windows" and (iac_postclone | bool)

    - name: Add approval gate fields
      ansible.builtin.set_fact:
        iac_command: "{{ iac_command + ['--approved-by', iac_approved_by, '--approval-token', iac_approval_token] }}"
      when: iac_action in ["apply", "destroy"]

    - name: Run IaC operation wrapper
      ansible.builtin.command:
        argv: "{{ iac_command }}"
        chdir: "{{ iac_repo_dir }}"
      environment:
        iac_vcenter_id: "{{ iac_vcenter_id | default('') }}"
        iac_vcenter_site: "{{ iac_vcenter_site | default('') }}"
        iac_vcenter_endpoint: "{{ iac_vcenter_endpoint | default('') }}"
        iac_vcenter_host: "{{ iac_vcenter_host | default('') }}"
        iac_vcenter_port: "{{ iac_vcenter_port | default('') }}"
        iac_vcenter_username: "{{ iac_vcenter_username | default('') }}"
        iac_vcenter_password: "{{ iac_vcenter_password | default('') }}"
        iac_vcenter_datacenter: "{{ iac_vcenter_datacenter | default('') }}"
        iac_vcenter_cluster: "{{ iac_vcenter_cluster | default('') }}"
        iac_vcenter_datastore: "{{ iac_vcenter_datastore | default('') }}"
        iac_vcenter_datastores: "{{ iac_vcenter_datastores | default('') }}"
        iac_vcenter_network: "{{ iac_vcenter_network | default('') }}"
        iac_vcenter_networks: "{{ iac_vcenter_networks | default('') }}"
        iac_runner_tag: "{{ iac_runner_tag | default('') }}"
      register: iac_operation
      failed_when: false
      changed_when: iac_action in ["apply", "destroy"]
      no_log: true

    - name: Show IaC operation result
      ansible.builtin.debug:
        msg: >-
          IaC {{ iac_platform }} {{ iac_action }} completed with rc={{ iac_operation.rc }}.
          Full evidence is stored under /opt/appserver/backups/iac/phase11_{{ iac_env }}_{{ iac_platform }}_{{ iac_action }}_*.

    - name: Fail when IaC operation failed
      ansible.builtin.fail:
        msg: >-
          IaC {{ iac_platform }} {{ iac_action }} failed with rc={{ iac_operation.rc }}.
          Open the latest phase11 operation summary and command log under /opt/appserver/backups/iac for details.
      when: iac_operation.rc != 0
